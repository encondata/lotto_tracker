services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lotto
      POSTGRES_PASSWORD: lotto
      POSTGRES_DB: lotto
    ports:
      # Host 5433 -> container 5432 (host 5432 is occupied by another local service).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotto"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://lotto:lotto@db:5432/lotto
      CORS_ALLOW_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
